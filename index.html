<style>
  :root{
    color-scheme: light;
    --bg: #f5f5f7;
    --card: #ffffff;
    --text: #0f172a;
    --muted: #64748b;
    --border: #e5e7eb;
    --border-soft: #f1f5f9;
    --primary: #4f46e5;
    --primary-soft: #eef2ff;
    --success: #10b981;
    --success-soft: #ecfdf5;
    --warning: #f59e0b;
    --danger: #ef4444;
    --danger-soft: #fee2e2;
    --radius: 14px;
    --radius-sm: 10px;
    --shadow: 0 1px 2px rgba(0,0,0,.04), 0 1px 3px rgba(0,0,0,.04);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
    --safe-top: env(safe-area-inset-top, 0px);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    font-size: 15px;
    line-height: 1.45;
    overscroll-behavior-y: contain;
    -webkit-font-smoothing: antialiased;
  }
  input, select, textarea, button { font-family: inherit; font-size: inherit; color: inherit; }
  input[type="number"]::-webkit-outer-spin-button,
  input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
  input[type="number"] { -moz-appearance: textfield; }

  .app { min-height: 100vh; }
  .content {
    padding: calc(12px + var(--safe-top)) 14px calc(96px + var(--safe-bottom));
    max-width: 560px;
    margin: 0 auto;
  }
  .header { display: flex; align-items: center; justify-content: space-between; padding: 4px 2px 12px; }
  .header h1 { margin: 0; font-size: 22px; font-weight: 700; letter-spacing: -0.02em; }
  .header .sub { font-size: 12px; color: var(--muted); margin-top: 2px; }

  /* Cards */
  .card {
    background: var(--card);
    border-radius: var(--radius);
    padding: 14px;
    margin-bottom: 12px;
    box-shadow: var(--shadow);
  }
  .card h2 { margin: 0 0 10px; font-size: 13px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }

  /* Date nav */
  .date-nav { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 12px; }
  .date-nav .date { font-size: 16px; font-weight: 600; flex: 1; text-align: center; }
  .nav-btn {
    width: 38px; height: 38px;
    border: none; background: var(--card);
    border-radius: 12px; box-shadow: var(--shadow);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }

  /* Macro ring */
  .macro-ring-wrap { display: flex; align-items: center; justify-content: center; padding: 10px 0 4px; }
  .macro-ring { position: relative; }
  .macro-ring .center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .macro-ring .big { font-size: 32px; font-weight: 700; line-height: 1; }
  .macro-ring .sub { font-size: 11px; color: var(--muted); margin-top: 4px; }

  /* Macro bars */
  .macro-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
  .macro-cell { padding: 8px; background: var(--bg); border-radius: var(--radius-sm); }
  .macro-cell .l { font-size: 11px; color: var(--muted); }
  .macro-cell .v { font-size: 15px; font-weight: 700; margin-top: 2px; }
  .macro-cell .t { font-size: 11px; color: var(--muted); }
  .pbar { height: 5px; border-radius: 3px; background: var(--border); margin-top: 6px; overflow: hidden; }
  .pbar > div { height: 100%; border-radius: 3px; transition: width .3s; }
  .pbar.protein > div { background: #ef4444; }
  .pbar.carbs > div { background: #f59e0b; }
  .pbar.fat > div { background: #8b5cf6; }
  .pbar.calories > div { background: var(--primary); }

  /* Quick stats row */
  .qstats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  .qstat { background: var(--card); border-radius: var(--radius-sm); padding: 10px; box-shadow: var(--shadow); }
  .qstat .l { font-size: 11px; color: var(--muted); }
  .qstat .v { font-size: 18px; font-weight: 700; margin-top: 2px; }
  .qstat .delta { font-size: 11px; margin-top: 2px; }
  .delta.pos { color: var(--success); }
  .delta.neg { color: var(--danger); }

  /* Meal section */
  .meal-block { background: var(--card); border-radius: var(--radius); margin-bottom: 12px; box-shadow: var(--shadow); overflow: hidden; }
  .meal-head { display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; }
  .meal-head .t { font-weight: 600; font-size: 15px; }
  .meal-head .s { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .meal-head .add-btn {
    background: var(--primary-soft); color: var(--primary); border: none;
    width: 36px; height: 36px; border-radius: 12px; font-size: 22px; font-weight: 600;
    display: flex; align-items: center; justify-content: center; cursor: pointer;
  }
  .food-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-top: 1px solid var(--border-soft); gap: 10px; }
  .food-row .nm { font-size: 14px; font-weight: 500; }
  .food-row .sv { font-size: 12px; color: var(--muted); margin-top: 1px; }
  .food-row .right { text-align: right; min-width: 70px; }
  .food-row .cal { font-size: 14px; font-weight: 600; }
  .food-row .mc { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .food-row.empty { color: var(--muted); font-size: 13px; justify-content: center; padding: 16px; }
  .food-row .actions { display: flex; gap: 4px; }
  .icon-btn-sm {
    width: 32px; height: 32px; border-radius: 8px;
    background: transparent; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    color: var(--muted);
  }
  .icon-btn-sm:active { background: var(--bg); }
  .icon-btn-sm.danger { color: var(--danger); }

  /* Workouts */
  .workout-card { background: var(--card); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; box-shadow: var(--shadow); }
  .workout-card .wh { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .workout-card .wn { font-weight: 600; font-size: 15px; }
  .workout-card .wt { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 500; }
  .badge.strength { background: #e0e7ff; color: #4338ca; }
  .badge.cardio { background: #ecfdf5; color: #047857; }
  .sets-table { margin-top: 10px; }
  .sets-table .hdr {
    display: grid; grid-template-columns: 32px 1fr 1fr 50px 28px;
    gap: 6px; font-size: 11px; color: var(--muted); padding: 4px 0; text-transform: uppercase; letter-spacing: 0.04em;
  }
  .set-row {
    display: grid; grid-template-columns: 32px 1fr 1fr 50px 28px;
    gap: 6px; align-items: center; margin-bottom: 6px;
  }
  .set-row .n { font-size: 13px; color: var(--muted); font-weight: 600; }
  .set-row input { padding: 8px 6px; text-align: center; border: 1px solid var(--border); border-radius: 8px; background: var(--card); width: 100%; min-width: 0; }
  .set-row .pr-flag { color: var(--warning); font-size: 16px; text-align: center; }
  .add-set { width: 100%; padding: 10px; margin-top: 4px; background: var(--bg); border: 1px dashed var(--border); border-radius: 10px; color: var(--muted); font-size: 13px; cursor: pointer; }
  .notes-input { width: 100%; margin-top: 8px; padding: 8px 10px; border: 1px solid var(--border); border-radius: 8px; background: var(--card); resize: vertical; min-height: 36px; }

  /* Bottom nav */
  .bottom-nav {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: rgba(255,255,255,0.92);
    -webkit-backdrop-filter: blur(20px) saturate(180%);
    backdrop-filter: blur(20px) saturate(180%);
    border-top: 1px solid var(--border);
    padding-bottom: var(--safe-bottom);
    display: flex; z-index: 50;
  }
  .bottom-nav button {
    flex: 1; padding: 8px 4px 6px; background: transparent; border: none;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    font-size: 10px; color: var(--muted); cursor: pointer; min-height: 56px;
    font-weight: 500;
  }
  .bottom-nav button.active { color: var(--primary); }
  .bottom-nav svg { width: 22px; height: 22px; }

  /* FAB sticky add */
  .fab {
    position: fixed;
    right: 16px;
    bottom: calc(72px + var(--safe-bottom));
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--primary); color: white; border: none;
    box-shadow: 0 6px 14px rgba(79,70,229,0.4);
    display: flex; align-items: center; justify-content: center;
    z-index: 40;
    cursor: pointer;
  }
  .fab svg { width: 26px; height: 26px; }

  /* Bottom sheet */
  .sheet-bg {
    position: fixed; inset: 0; background: rgba(0,0,0,0.45);
    z-index: 100; opacity: 0; pointer-events: none;
    transition: opacity .22s ease;
  }
  .sheet-bg.open { opacity: 1; pointer-events: auto; }
  .sheet {
    position: fixed; left: 0; right: 0; bottom: 0;
    background: var(--card);
    border-radius: 22px 22px 0 0;
    max-height: 92vh;
    overflow-y: auto;
    transform: translateY(100%);
    transition: transform .26s cubic-bezier(.32,.72,0,1);
    padding: 0 16px calc(20px + var(--safe-bottom));
    z-index: 101;
  }
  .sheet.open { transform: translateY(0); }
  .sheet-handle { width: 36px; height: 4px; background: #d1d5db; border-radius: 2px; margin: 10px auto 6px; }
  .sheet-header { display: flex; align-items: center; justify-content: space-between; padding: 6px 0 12px; position: sticky; top: 0; background: var(--card); z-index: 1; }

    set(k, v) { try { localStorage.setItem(k, v); return true; } catch(e) { return false; } },
    del(k) { try { localStorage.removeItem(k); } catch(e) {} }
  };
  function loadData() {
    const raw = safeLS.get(STORAGE_KEY);
    if (raw) {
      try { return migrate(JSON.parse(raw)); } catch(e) {}
    }
    return defaultData();
  }
  function defaultData() {
    return {
      version: 1,
      profile: {

      },
      weightLog: [],
      days: {},
      customFoods: [],
      onboarded: false,
      hideInstallBanner: false
    };
  }
  function migrate(d) {
    const def = defaultData();
    return {
      ...def, ...d,
      profile: { ...def.profile, ...(d.profile || {}) },
      providers: {
        ...def.providers, ...(d.providers || {}),

        nutritionix: { ...def.providers.nutritionix, ...((d.providers || {}).nutritionix || {}) },
        edamam: { ...def.providers.edamam, ...((d.providers || {}).edamam || {}) }
      },
      days: d.days || {},
      weightLog: d.weightLog || [],
      customFoods: d.customFoods || []
    };
  }

  /* ---------- Date helpers ---------- */
  function todayKey(d) {
    d = d || new Date();
    return d.getFullYear() + "-" + String(d.getMonth()+1).padStart(2,"0") + "-" + String(d.getDate()).padStart(2,"0");
  }
  function fmtDate(key) {
    const [y,m,d] = key.split("-").map(Number);
    const dt = new Date(y, m-1, d);
    const today = todayKey();
    const yest = todayKey(new Date(Date.now() - 86400000));
    if (key === today) return "Today";
    if (key === yest) return "Yesterday";
    return dt.toLocaleDateString(undefined, { weekday: "short", month: "short", day: "numeric" });
  }
  function shift(key, n) {
    const [y,m,d] = key.split("-").map(Number);
    const dt = new Date(y, m-1, d);
    dt.setDate(dt.getDate()+n);
    return todayKey(dt);
  }
  function uid() { return Math.random().toString(36).slice(2, 10) + Date.now().toString(36).slice(-4); }

  /* ---------- Macro / Targets ---------- */
  function computeTargets(profile) {
    const p = profile;
    // Mifflin-St Jeor
    let bmr;
    if (p.sex === "male") bmr = 10*p.weightKg + 6.25*p.heightCm - 5*p.age + 5;
    else bmr = 10*p.weightKg + 6.25*p.heightCm - 5*p.age - 161;
    const tdee = bmr * (p.activity || 1.55);
    let adjust = 0;
    if (p.goal === "bulk") adjust = 300;
    else if (p.goal === "cut") adjust = -400;
    else if (p.goal === "lean-bulk") adjust = 150;
    let calories = p.customCalories || Math.round(tdee + adjust);
    let protein, carbs, fat;
    if (p.customMacros) {
      protein = p.customMacros.protein; carbs = p.customMacros.carbs; fat = p.customMacros.fat;
    } else {
      const proteinPerKg = p.goal === "cut" ? 2.2 : (p.goal === "bulk" ? 2.0 : 1.8);
      protein = Math.round(p.weightKg * proteinPerKg);
      const fatPct = p.goal === "cut" ? 0.3 : 0.27;
      fat = Math.round((calories * fatPct) / 9);
      const carbsKcal = calories - (protein * 4 + fat * 9);
      carbs = Math.max(50, Math.round(carbsKcal / 4));
    }
    const bmi = p.heightCm > 0 ? p.weightKg / Math.pow(p.heightCm/100, 2) : 0;
    return { bmr: Math.round(bmr), tdee: Math.round(tdee), calories, protein, carbs, fat, bmi: Math.round(bmi*10)/10 };

  const mockProvider = {
    id: "mock",
    name: "Local Database",
    builtIn: true,
    async search(query, _cfg, customFoods) {
      const q = (query || "").toLowerCase().trim();
      if (!q) return [];
      const all = [...MOCK_FOODS, ...(customFoods || [])];
      // Score by match quality
      const scored = all.map(f => {
        const n = f.name.toLowerCase();
        let score = 0;
        if (n.startsWith(q)) score += 10;
        if (n.includes(q)) score += 5;
        const words = q.split(/\s+/);
        words.forEach(w => { if (w && n.includes(w)) score += 2; });
        return { f, score };
      }).filter(x => x.score > 0)
        .sort((a,b) => b.score - a.score)
        .slice(0, 15)
        .map(x => x.f);
      return scored;

  const usdaProvider = {

      const url = "https://api.nal.usda.gov/fdc/v1/foods/search?api_key=" + encodeURIComponent(apiKey) + "&query=" + encodeURIComponent(query) + "&pageSize=15";
      const r = await fetch(url);
      if (!r.ok) throw new Error("USDA API error " + r.status);
      const data = await r.json();
      const getN = (food, id) => {
        const n = (food.foodNutrients || []).find(x => x.nutrientId === id || x.nutrientNumber == id);
        return n ? (n.value || 0) : 0;

  // Stubs - structured so anyone can fill in fetch logic

  /* ---------- Cardio MET table ---------- */

    { name: "Walking", met: 3.5 },

    { name: "Cycling", met: 7.5 },

    { name: "HIIT", met: 9 },

    { name: "Hiking", met: 6 }
  ];
  function cardioCalories(w, weightKg) {
    const met = w.met || 6;
    return Math.round(met * weightKg * (w.minutes / 60));
  }
  function strengthCalories(w, weightKg) {
    const sets = w.sets || [];
    if (!sets.length) return 0;
    const totalSets = sets.length;
    const totalReps = sets.reduce((s,x) => s + (Number(x.reps)||0), 0);
    const totalVol = sets.reduce((s,x) => s + (Number(x.reps)||0)*(Number(x.weight)||0), 0);
    return Math.max(15, Math.round(totalSets*5 + totalReps*0.5 + totalVol*0.04));
  }

  /* ---------- Day data helpers ---------- */
  function ensureDay(days, key) {
    if (!days[key]) {
      days[key] = { meals: [], workouts: [], weightKg: null };
    }
    return days[key];
  }
  function dayTotals(day) {
    const t = { calories:0, protein:0, carbs:0, fat:0, fiber:0, sugar:0, sodium:0 };
    if (!day) return t;
    (day.meals || []).forEach(m => {
      const q = m.qty || 1;
      t.calories += (m.calories||0)*q;
      t.protein += (m.protein||0)*q;
      t.carbs += (m.carbs||0)*q;
      t.fat += (m.fat||0)*q;
      t.fiber += (m.fiber||0)*q;
      t.sugar += (m.sugar||0)*q;
      t.sodium += (m.sodium||0)*q;
    });
    Object.keys(t).forEach(k => t[k] = Math.round(t[k] * 10) / 10);
    return t;
  }
  function dayBurn(day) {
    if (!day) return 0;
    return (day.workouts || []).reduce((s,w) => s + (w.calories||0), 0);

  function Sheet({ open, onClose, title, children }) {

      window.addEventListener("keydown", onKey);
      document.body.style.overflow = "hidden";
      return () => {

        document.body.style.overflow = "";
      };

  /* ---------- Dashboard ---------- */
  function MacroRing({ consumed, target }) {
    const pct = Math.min(100, target ? (consumed/target)*100 : 0);
    const size = 160, stroke = 14, r = (size - stroke) / 2;
    const c = 2 * Math.PI * r;
    const dash = (pct/100) * c;
    return h("div", { className: "macro-ring", style: { width: size, height: size } },
      h("svg", { width: size, height: size, viewBox: "0 0 " + size + " " + size, style: { transform: "rotate(-90deg)" } },
        h("circle", { cx: size/2, cy: size/2, r, stroke: "#e5e7eb", strokeWidth: stroke, fill: "none" }),
        h("circle", { cx: size/2, cy: size/2, r, stroke: "#4f46e5", strokeWidth: stroke, fill: "none", strokeDasharray: c, strokeDashoffset: c - dash, strokeLinecap: "round", style: { transition: "stroke-dashoffset 0.5s" } })

  function greeting() {
    const hr = new Date().getHours();
    if (hr < 12) return "Good morning";
    if (hr < 17) return "Good afternoon";
    return "Good evening";
  }

  function macroCell(label, val, target, unit, cls) {
    const pct = target ? Math.min(100, (val/target)*100) : 0;
    return h("div", { className: "macro-cell", key: label },
      h("div", { className: "l" }, label),
      h("div", { className: "v" }, Math.round(val) + unit),
      h("div", { className: "t" }, "of " + Math.round(target) + unit),
      h("div", { className: "pbar " + cls }, h("div", { style: { width: pct + "%" } }))
    );
  }

  function WeightTrendChart({ log }) {
    const w = 320, ht = 80, pad = 8;
    const vals = log.map(l => l.kg);
    const minV = Math.min(...vals) - 0.5;
    const maxV = Math.max(...vals) + 0.5;
    const range = maxV - minV || 1;
    const pts = log.map((l, i) => {
      const x = pad + (i / Math.max(1, log.length - 1)) * (w - pad*2);
      const y = ht - pad - ((l.kg - minV) / range) * (ht - pad*2);
      return [x, y];
    });
    const d = pts.map((p, i) => (i === 0 ? "M" : "L") + p[0].toFixed(1) + "," + p[1].toFixed(1)).join(" ");
    return h("div", { className: "trend" },
      h("svg", { viewBox: "0 0 " + w + " " + ht, preserveAspectRatio: "none" },
        h("path", { d: d + " L" + pts[pts.length-1][0] + "," + (ht-pad) + " L" + pad + "," + (ht-pad) + " Z", fill: "rgba(79,70,229,0.1)" }),
        h("path", { d, stroke: "#4f46e5", strokeWidth: 2, fill: "none", strokeLinecap: "round", strokeLinejoin: "round" }),

      )
    );

  function FoodRow({ item, onDelete, onEdit }) {

  function EditFoodForm({ item, onSave, onCancel }) {
    const [v, setV] = useState({
      qty: item.qty || 1,
      calories: item.calories || 0,
      protein: item.protein || 0,
      carbs: item.carbs || 0,
      fat: item.fat || 0,
      fiber: item.fiber || 0,
      sugar: item.sugar || 0,
      sodium: item.sodium || 0,
      serving: item.serving || ""
    });

  /* ---------- Add Meal sheet ---------- */
  function AddMealSheet({ open, onClose, data, setData, activeDate, slot }) {
    const [query, setQuery] = useState("");
    const [results, setResults] = useState([]);
    const [loading, setLoading] = useState(false);
    const [err, setErr] = useState(null);
    const [mode, setMode] = useState("search"); // search | manual
    const toast = useToast();
    const inputRef = useRef();

    useEffect(() => {
      if (open) {
        setQuery("");
        setResults([]);
        setErr(null);
        setMode("search");
        setTimeout(() => { try { inputRef.current && inputRef.current.focus(); } catch(e) {} }, 320);
      }
    }, [open]);

    useEffect(() => {
      if (!open) return;
      let cancelled = false;
      const q = query.trim();
      if (q.length < 1) { setResults([]); return; }
      setLoading(true);
      setErr(null);
      const provId = data.providers.active;
      const prov = PROVIDERS[provId];
      const cfg = data.providers[provId];
      const t = setTimeout(async () => {
        try {
          let res;
          if (prov.id === "mock") {
            res = await prov.search(q, null, data.customFoods);
          } else {
            res = await prov.search(q, cfg);
          }
          if (!cancelled) setResults(res || []);
        } catch(e) {
          if (!cancelled) { setErr(e.message || "Search failed"); setResults([]); }
        } finally {
          if (!cancelled) setLoading(false);
        }
      }, 200);
      return () => { cancelled = true; clearTimeout(t); };
    }, [query, open, data.providers, data.customFoods]);

    const pick = (food) => {
      const next = { ...data };
      const d = ensureDay(next.days, activeDate);
      d.meals.push({
        id: uid(),
        slot: slot || "snacks",
        time: Date.now(),
        qty: 1,
        ...food
      });
      setData(next);
      toast("Added " + food.name);
      onClose();
    };

    const slotName = (MEAL_SLOTS.find(s => s.id === slot) || {}).name || "meal";

    return h(Sheet, { open, onClose, title: "Add to " + slotName },
      h("div", { className: "seg" },
        h("button", { className: mode === "search" ? "active" : "", onClick: () => setMode("search") }, "Search"),
        h("button", { className: mode === "manual" ? "active" : "", onClick: () => setMode("manual") }, "Manual entry")
      ),
      mode === "search" ? h(React.Fragment, null,
        h("div", { className: "field" },
          h("input", {
            ref: inputRef,
            className: "input",
            placeholder: "Search foods (e.g. jowar bhakri, eggs, banana)",
            value: query,
            onChange: (e) => setQuery(e.target.value),
            autoComplete: "off",
            autoCapitalize: "none"
          })
        ),
        h("div", { style: { fontSize: 11, color: "var(--muted)", marginBottom: 8 } },
          "Source: " + PROVIDERS[data.providers.active].name +
          (data.providers.active === "mock" ? " · works offline" : "")
        ),
        loading && h("div", { style: { padding: 20, textAlign: "center", color: "var(--muted)" } }, "Searching..."),
        err && h("div", { style: { padding: 12, background: "var(--danger-soft)", color: "var(--danger)", borderRadius: 10, fontSize: 13 } }, err),
        !loading && !err && query.length > 0 && results.length === 0 && h("div", { style: { padding: 16, textAlign: "center", color: "var(--muted)", fontSize: 13 } },
          "No matches. Try \"manual entry\" to add it yourself."),
        h("div", { className: "search-list" },
          results.map(r => h("div", { key: r.id, className: "search-item", onClick: () => pick(r) },
            h("div", { style: { flex: 1, minWidth: 0 } },
              h("div", { className: "nm" }, r.name),
              h("div", { className: "sv" }, r.serving + " · P" + Math.round(r.protein||0) + " C" + Math.round(r.carbs||0) + " F" + Math.round(r.fat||0))
            ),
            h("div", { className: "cal" }, Math.round(r.calories||0) + " kcal")
          ))
        )
      ) : h(ManualFoodEntry, { onAdd: pick, onSaveCustom: (food) => {
        const next = { ...data, customFoods: [...(data.customFoods || []), { ...food, id: "custom-" + uid() }] };
        setData(next);
        toast("Saved to your foods");
      } })
    );
  }

  /* ---------- Workouts ---------- */
  function WorkoutsTab({ data, setData, activeDate, setActiveDate, openAddWorkout }) {
    const day = data.days[activeDate] || { workouts: [] };
    const burn = dayBurn(day);
    const wOut = day.workouts || [];

    const updateWorkout = (id, patch) => {
      const next = { ...data };
      const d = ensureDay(next.days, activeDate);
      d.workouts = d.workouts.map(w => {
        if (w.id !== id) return w;
        const merged = { ...w, ...patch };
        if (merged.type === "strength") merged.calories = strengthCalories(merged, next.profile.weightKg);
        else merged.calories = cardioCalories(merged, next.profile.weightKg);
        return merged;
      });
      setData(next);
    };
    const removeWorkout = (id) => {
      const next = { ...data };
      const d = ensureDay(next.days, activeDate);
      d.workouts = d.workouts.filter(w => w.id !== id);
      setData(next);
    };

    return h("div", null,

      ) : null,
      wOut.map(w => w.type === "strength"

        : h(CardioCard, { key: w.id, w, onChange: (p) => updateWorkout(w.id, p), onRemove: () => removeWorkout(w.id) })
      )
    );
  }

  function isPR(exercise, weight, reps, days, currentWorkoutId) {
    if (!weight || !reps) return false;
    let max = 0;
    for (const dayKey in days) {
      const ws = days[dayKey].workouts || [];
      for (const w of ws) {
        if (w.type !== "strength" || w.name !== exercise || w.id === currentWorkoutId) continue;
        for (const s of (w.sets || [])) {
          if (s.weight && s.reps && s.weight * s.reps > max) max = s.weight * s.reps;
        }
      }
    }
    return weight * reps > max;
  }

  function StrengthCard({ w, prs, allDays, onChange, onRemove }) {
    const setsArr = w.sets || [];
    const updateSet = (i, patch) => {
      const sets = setsArr.map((s, idx) => idx === i ? { ...s, ...patch } : s);
      onChange({ sets });
    };
    const addSet = () => {
      const last = setsArr[setsArr.length - 1] || { weight: 0, reps: 8 };
      onChange({ sets: [...setsArr, { weight: last.weight, reps: last.reps, rpe: last.rpe || "" }] });
    };
    const removeSet = (i) => {
      onChange({ sets: setsArr.filter((_, idx) => idx !== i) });
    };

    return h("div", { className: "workout-card" },
      h("div", { className: "wh" },
        h("div", { style: { flex: 1, minWidth: 0 } },
          h("div", { className: "wn" }, w.name),
          h("div", { className: "wt" }, h("span", { className: "badge strength" }, "Strength"), " · " + setsArr.length + " sets · " + w.calories + " kcal")
        ),
        h("button", { className: "icon-btn-sm danger", onClick: () => { if (confirm("Remove workout?")) onRemove(); } }, Icon("trash", 18))
      ),
      h("div", { className: "sets-table" },
        h("div", { className: "hdr" },
          h("div", null, "#"),
          h("div", null, "Weight"),
          h("div", null, "Reps"),
          h("div", null, "RPE"),
          h("div", null, "")
        ),
        setsArr.map((s, i) => {
          const pr = isPR(w.name, Number(s.weight), Number(s.reps), allDays, w.id);
          return h("div", { className: "set-row", key: i },
            h("div", { className: "n" }, (i+1) + (pr ? " 🏆" : "")),
            h("input", { type: "number", inputMode: "decimal", placeholder: "kg", value: s.weight ?? "", onChange: (e) => updateSet(i, { weight: e.target.value === "" ? "" : Number(e.target.value) }) }),
            h("input", { type: "number", inputMode: "numeric", placeholder: "reps", value: s.reps ?? "", onChange: (e) => updateSet(i, { reps: e.target.value === "" ? "" : Number(e.target.value) }) }),
            h("input", { type: "number", inputMode: "decimal", step: "0.5", placeholder: "@", value: s.rpe ?? "", onChange: (e) => updateSet(i, { rpe: e.target.value === "" ? "" : Number(e.target.value) }) }),
            h("button", { className: "icon-btn-sm danger", onClick: () => removeSet(i) }, Icon("close", 16))
          );
        })
      ),
      h("button", { className: "add-set", onClick: addSet }, "+ Add set"),
      h("textarea", {
        className: "notes-input",
        placeholder: "Notes (optional)",
        value: w.notes || "",
        onChange: (e) => onChange({ notes: e.target.value })
      })
    );
  }

  /* ---------- Add Workout Sheet ---------- */
  function AddWorkoutSheet({ open, onClose, data, setData, activeDate }) {
    const [type, setType] = useState("strength");
    const [name, setName] = useState("");
    const [minutes, setMinutes] = useState(30);
    const [distance, setDistance] = useState("");
    const [met, setMet] = useState(7);
    const toast = useToast();

    useEffect(() => {
      if (open) { setName(""); setMinutes(30); setDistance(""); setMet(7); }
    }, [open]);

    const recentExercises = useMemo(() => {
      const set = new Set();
      const list = [];
      const keys = Object.keys(data.days || {}).sort().reverse().slice(0, 30);
      for (const k of keys) {
        for (const w of (data.days[k].workouts || [])) {
          if (w.type === "strength" && !set.has(w.name)) {
            set.add(w.name); list.push(w.name);
            if (list.length >= 10) return list;
          }
        }
      }
      return list;
    }, [data.days, open]);

    const submit = () => {
      const nm = name.trim();
      if (!nm) { toast("Enter a name"); return; }
      const next = { ...data };
      const d = ensureDay(next.days, activeDate);
      let w;
      if (type === "strength") {
        w = { id: uid(), type: "strength", name: nm, sets: [{ weight: 0, reps: 8, rpe: "" }], notes: "", time: Date.now(), calories: 0 };
        w.calories = strengthCalories(w, next.profile.weightKg);
      } else {
        w = {
          id: uid(), type: "cardio", name: nm,
          minutes: Number(minutes) || 30,
          distanceKm: distance === "" ? null : Number(distance),
          met: Number(met),
          notes: "", time: Date.now(), calories: 0

      const next = { ...data };
      next.profile = { ...next.profile, weightKg: kg };
      const dateKey = todayKey();
      const log = (next.weightLog || []).filter(x => x.date !== dateKey);

      setData(next);
      toast("Weight logged");

      ),
      h("button", { className: "btn", onClick: save }, "Save")

  /* ---------- History ---------- */
  function HistoryTab({ data }) {
    const targets = computeTargets(data.profile);
    const today = todayKey();
    const days = [];
    for (let i = 6; i >= 0; i--) {
      const key = shift(today, -i);
      const d = data.days[key];
      const t = dayTotals(d);
      const b = dayBurn(d);
      days.push({ key, ...t, burn: b, net: t.calories - b });
    }
    const maxCal = Math.max(targets.calories * 1.1, ...days.map(d => d.calories), 100);

    // 30d
    const days30 = [];
    for (let i = 29; i >= 0; i--) {
      const key = shift(today, -i);
      const d = data.days[key];
      days30.push({ key, ...dayTotals(d), burn: dayBurn(d) });
    }
    const logged = days30.filter(d => d.calories > 0);
    const avg = logged.length > 0 ? {
      cal: Math.round(logged.reduce((s,d) => s + d.calories, 0) / logged.length),
      p: Math.round(logged.reduce((s,d) => s + d.protein, 0) / logged.length),
      c: Math.round(logged.reduce((s,d) => s + d.carbs, 0) / logged.length),
      f: Math.round(logged.reduce((s,d) => s + d.fat, 0) / logged.length),
      b: Math.round(logged.reduce((s,d) => s + d.burn, 0) / logged.length)
    } : { cal: 0, p: 0, c: 0, f: 0, b: 0 };

    // PRs
    const prs = useMemo(() => {
      const map = {};
      for (const k in data.days) {
        for (const w of (data.days[k].workouts || [])) {
          if (w.type !== "strength") continue;
          for (const s of (w.sets || [])) {
            if (!s.weight || !s.reps) continue;
            const cur = map[w.name];
            const vol = s.weight * s.reps;
            // 1RM Epley estimate
            const e1rm = s.weight * (1 + s.reps/30);
            if (!cur || vol > cur.vol) {
              map[w.name] = { vol, weight: s.weight, reps: s.reps, date: k, e1rm: Math.round(e1rm*10)/10 };
            }
          }
        }
      }
      return Object.entries(map).sort((a,b) => b[1].e1rm - a[1].e1rm).slice(0, 8);
    }, [data.days]);

    return h("div", null,
      h("div", { className: "header" }, h("div", null, h("h1", null, "History"))),

      // Bars
      h("div", { className: "card" },
        h("h2", null, "Last 7 days - calories"),
        h("div", { className: "history-bars" },
          days.map(d => {
            const consumedH = maxCal ? Math.max(2, (d.calories / maxCal) * 130) : 0;
            const isToday = d.key === today;
            const [y,m,dd] = d.key.split("-").map(Number);
            const lbl = ["Sun","Mon","Tue","Wed","Thu","Fri","Sat"][new Date(y, m-1, dd).getDay()];
            return h("div", { key: d.key, className: "hb" + (isToday ? " active" : "") },
              h("div", { className: "v" }, d.calories > 0 ? Math.round(d.calories) : ""),
              h("div", { className: "bar-stack" },
                h("div", { className: "bar", style: { height: consumedH + "px" } })
              ),
              h("div", { className: "lbl" }, lbl)
            );
          })
        ),
        h("div", { style: { fontSize: 12, color: "var(--muted)", textAlign: "center", marginTop: 4 } },
          "Daily target: " + targets.calories + " kcal")
      ),

      // 30d averages
      h("div", { className: "card" },
        h("h2", null, "30-day averages (" + logged.length + " days logged)"),
        logged.length > 0 ? h("div", null,
          h("div", { className: "macro-grid" },
            h("div", { className: "macro-cell" }, h("div", { className: "l" }, "Calories"), h("div", { className: "v" }, avg.cal + " kcal")),
            h("div", { className: "macro-cell" }, h("div", { className: "l" }, "Protein"), h("div", { className: "v" }, avg.p + "g")),
            h("div", { className: "macro-cell" }, h("div", { className: "l" }, "Burned"), h("div", { className: "v" }, avg.b + " kcal"))
          ),
          h("div", { className: "macro-grid", style: { marginTop: 8 } },
            h("div", { className: "macro-cell" }, h("div", { className: "l" }, "Carbs"), h("div", { className: "v" }, avg.c + "g")),
            h("div", { className: "macro-cell" }, h("div", { className: "l" }, "Fat"), h("div", { className: "v" }, avg.f + "g")),
            h("div", { className: "macro-cell" }, h("div", { className: "l" }, "Net cal"), h("div", { className: "v" }, (avg.cal - avg.b) + ""))
          )
        ) : h("div", { className: "empty-state" }, h("div", { className: "t" }, "Log a few days first"))
      ),

      // PRs
      h("div", { className: "card" },
        h("h2", null, "Personal Records"),
        prs.length === 0 ? h("div", { className: "empty-state" },
          h("div", { className: "ic" }, "🏆"),
          h("div", { className: "t" }, "No PRs yet"),
          h("div", { className: "s" }, "Log strength workouts to track records")
        ) : prs.map(([name, pr]) => h("div", { key: name, style: { display: "flex", justifyContent: "space-between", alignItems: "center", padding: "10px 0", borderBottom: "1px solid var(--border-soft)" } },

            h("div", { style: { fontSize: 12, color: "var(--muted)" } }, pr.weight + "kg × " + pr.reps + " reps · " + fmtDate(pr.date))

            h("div", { style: { fontSize: 11, color: "var(--muted)" } }, "est. 1RM")
          )
        ))
      )
    );
  }

        ...p,
        age: Number(p.age) || 28,
        heightCm: Number(p.heightCm) || 175,
        weightKg: Number(p.weightKg) || 75,
        bodyFatPct: p.bodyFatPct === "" || p.bodyFatPct == null ? null : Number(p.bodyFatPct),
        muscleKg: p.muscleKg === "" || p.muscleKg == null ? null : Number(p.muscleKg),
        fatKg: p.fatKg === "" || p.fatKg == null ? null : Number(p.fatKg),
        activity: Number(p.activity) || 1.55
      } };
      // Auto-log weight today if changed
      const dateKey = todayKey();
      const log = (next.weightLog || []).filter(x => x.date !== dateKey);

  /* ---------- Sample data ---------- */
  function makeSampleData(profile) {
    const data = defaultData();
    data.profile = { ...data.profile, ...profile, weightKg: profile.weightKg || 75 };
    data.onboarded = true;
    const t = todayKey();
    // 6 days of meals/workouts
    const sampleFoods = (slot, items) => items.map(([id, qty]) => {
      const f = MOCK_FOODS.find(x => x.id === id);
      return f ? { ...f, id: uid(), slot, qty: qty || 1, time: Date.now() } : null;
    }).filter(Boolean);
    for (let i = 0; i < 6; i++) {
      const key = shift(t, -i);
      data.days[key] = { meals: [], workouts: [] };
      data.days[key].meals.push(
        ...sampleFoods("breakfast", [["oats", 1], ["banana", 1], ["whey-protein", 1]]),
        ...sampleFoods("lunch", [["roti", 2], ["dal-toor", 1], ["okra-sabji", 1], ["curd", 0.5]]),
        ...sampleFoods("snacks", [["almonds", 1], ["apple", 1]]),
        ...sampleFoods("dinner", [["chicken-breast", 1.5], ["rice-brown", 1], ["broccoli", 1]])
      );
      if (i % 2 === 0) {
        const w = { id: uid(), type: "strength", name: i % 4 === 0 ? "Bench Press" : "Squat", sets: [
          { weight: 60, reps: 8, rpe: 7 }, { weight: 60, reps: 8, rpe: 7.5 }, { weight: 60, reps: 7, rpe: 8 }
        ], notes: "", time: Date.now(), calories: 0 };
        w.calories = strengthCalories(w, data.profile.weightKg);
        data.days[key].workouts.push(w);
      } else {
        const w = { id: uid(), type: "cardio", name: "Running", minutes: 30, distanceKm: 5, met: 9, notes: "", time: Date.now(), calories: 0 };
        w.calories = cardioCalories(w, data.profile.weightKg);
        data.days[key].workouts.push(w);
      }
    }
    // Weight log: gradual upward trend (bulk)
    for (let i = 13; i >= 0; i--) {
      data.weightLog.push({ date: shift(t, -i), kg: Math.round((data.profile.weightKg - 0.6 + (13-i)*0.05) * 10) / 10 });
    }
    return data;
  }

  /* ---------- Install banner ---------- */
  function InstallBanner({ onDismiss }) {

        h("div", { className: "t" }, "Add to Home Screen"),

      ),
      h("button", { className: "close-x", onClick: onDismiss, "aria-label": "Dismiss" }, "×")

  /* ---------- App root ---------- */
  function App() {
    const [data, setDataRaw] = useState(loadData);
    const [tab, setTab] = useState("dashboard");
    const [activeDate, setActiveDate] = useState(todayKey());
    const [sheet, setSheet] = useState(null); // { type, slot? }
    const toast = useToast();

    const setData = useCallback((next) => {
      setDataRaw(next);
      safeLS.set(STORAGE_KEY, JSON.stringify(next));
    }, []);

    // Onboarding: prompt for profile on first load
    useEffect(() => {
      if (!data.onboarded) {
        setSheet({ type: "profile" });
      }
    }, []);

    const openAddMeal = (slot) => setSheet({ type: "add-meal", slot });
    const openAddWorkout = () => setSheet({ type: "add-workout" });
    const closeSheet = () => setSheet(null);

    const exportData = () => {
      const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = "fittrack-backup-" + todayKey() + ".json";
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 500);
      toast("Backup downloaded");
    };
    const importData = () => {
      const inp = document.createElement("input");
      inp.type = "file";
      inp.accept = "application/json,.json";
      inp.onchange = (e) => {
        const file = e.target.files && e.target.files[0];
        if (!file) return;
        const r = new FileReader();
        r.onload = () => {
          try {
            const parsed = JSON.parse(r.result);
            if (!confirm("This will replace your current data. Continue?")) return;
            setData(migrate(parsed));
            toast("Backup imported");
          } catch(e) { toast("Invalid backup file"); }
        };
        r.readAsText(file);
      };
      inp.click();
    };
    const resetData = () => {
      if (!confirm("Erase ALL data? This cannot be undone.")) return;
      if (!confirm("Are you absolutely sure?")) return;
      const fresh = defaultData();
      setData(fresh);
      setActiveDate(todayKey());
      toast("Reset complete");
    };
    const loadSample = () => {
      if (Object.keys(data.days).length > 0 && !confirm("Replace current data with sample data?")) return;
      setData(makeSampleData(data.profile));
      toast("Sample data loaded");
    };

    const tabs = [
      { id: "dashboard", name: "Home", icon: "home" },
      { id: "meals", name: "Meals", icon: "meal" },
      { id: "workouts", name: "Workouts", icon: "workout" },
      { id: "history", name: "History", icon: "history" },
      { id: "profile", name: "Profile", icon: "user" }
    ];

    return h("div", { className: "app" },
      h("main", { className: "content" },
        !data.hideInstallBanner && tab === "dashboard" && h(InstallBanner, {
          onDismiss: () => setData({ ...data, hideInstallBanner: true })
        }),
        tab === "dashboard" && h(Dashboard, { data, setData, activeDate, setActiveDate, openWeightSheet: () => setSheet({ type: "weight" }) }),
        tab === "meals" && h(MealsTab, { data, setData, activeDate, setActiveDate, openAddMeal }),
        tab === "workouts" && h(WorkoutsTab, { data, setData, activeDate, setActiveDate, openAddWorkout }),
        tab === "history" && h(HistoryTab, { data }),
        tab === "profile" && h(ProfileTab, { data, setData, onOpenSheet: (t) => setSheet({ type: t }), importData, exportData, resetData, loadSample })
      ),

      // FABs
      (tab === "meals") && h("button", {
        className: "fab", onClick: () => openAddMeal("snacks"), "aria-label": "Add meal"
      }, Icon("plus", 26)),
      (tab === "workouts") && h("button", {
        className: "fab", onClick: openAddWorkout, "aria-label": "Add workout"
      }, Icon("plus", 26)),

      // Bottom nav
      h("nav", { className: "bottom-nav" },
        tabs.map(t => h("button", {
          key: t.id,
          className: tab === t.id ? "active" : "",
          onClick: () => setTab(t.id),
          "aria-label": t.name
        }, Icon(t.icon, 22), h("span", null, t.name)))
      ),

      // Sheets
      h(AddMealSheet, { open: sheet && sheet.type === "add-meal", onClose: closeSheet, data, setData, activeDate, slot: sheet && sheet.slot }),
      h(AddWorkoutSheet, { open: sheet && sheet.type === "add-workout", onClose: closeSheet, data, setData, activeDate }),
      h(WeightSheet, { open: sheet && sheet.type === "weight", onClose: closeSheet, data, setData }),
      h(ProfileSheet, { open: sheet && sheet.type === "profile", onClose: closeSheet, data, setData }),
      h(ProvidersSheet, { open: sheet && sheet.type === "providers", onClose: closeSheet, data, setData })
    );
  }

  /* ---------- Mount ---------- */
  const root = ReactDOM.createRoot(document.getElementById("root"));
  root.render(h(ToastProvider, null, h(App)));

  /* ---------- Service Worker (best effort) ---------- */
  if ("serviceWorker" in navigator) {
    const swCode = "const C='fittrack-v1';self.addEventListener('install',e=>self.skipWaiting());self.addEventListener('activate',e=>e.waitUntil(self.clients.claim()));self.addEventListener('fetch',e=>{if(e.request.method!=='GET')return;e.respondWith(caches.open(C).then(c=>c.match(e.request).then(r=>r||fetch(e.request).then(res=>{try{c.put(e.request,res.clone())}catch(x){}return res}).catch(()=>r))))});";
    try {
      const blob = new Blob([swCode], { type: "application/javascript" });
      const url = URL.createObjectURL(blob);
      navigator.serviceWorker.register(url).catch(() => {});
    } catch(e) {}
  }
})();
</script>
</body>
</html>
